name: Daily Database Backup

on:
  schedule:
    - cron: '30 20 * * *'
  workflow_dispatch: {}

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install PostgreSQL 17 client
        run: |
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc --fail https://www.postgresql.org/media/keys/ACCC4CF8.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Dump database
        env:
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "$DB_URL" ]; then
            echo "::error::SUPABASE_DB_URL secret is not set. Add it in repo Settings -> Secrets and variables -> Actions."
            exit 1
          fi
          export PATH="/usr/lib/postgresql/17/bin:$PATH"
          pg_dump --version
          STAMP=$(date -u +'%Y-%m-%d')
          pg_dump "$DB_URL" --no-owner --no-privileges -Fc -f "dukoll-backup-$STAMP.dump"
          ls -lh "dukoll-backup-$STAMP.dump"
          psql "$DB_URL" -c "insert into backup_log(type, note) values ('auto', 'Daily automated pg_dump');" || echo "backup_log insert skipped"

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: dukoll-db-backup-${{ github.run_number }}
          path: dukoll-backup-*.dump
          retention-days: 90
